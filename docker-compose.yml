# Seance 14 + 17 - Stack classification + Airflow.
#
#   docker compose up -d mlflow api
#   docker compose --profile airflow up -d          # UI http://localhost:8080
#   docker compose --profile frontend up -d frontend
#   VPS : ouvrir le port 8080 (Security List + iptables) pour Airflow

services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.13.0
    command: >
      mlflow server
      --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --artifacts-destination /mlflow/artifacts
      --serve-artifacts
      --allowed-hosts "*"
      --cors-allowed-origins "*"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow

  train:
    build:
      context: .
      dockerfile: docker/Dockerfile.train
    # Entraine la baseline -> models/model.joblib (sans metriques MLflow comparatives).
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      - mlflow
    volumes:
      - models_data:/app/models
    profiles:
      - train

  train-models:
    build:
      context: .
      dockerfile: docker/Dockerfile.train
    # Compare RF / XGBoost / LightGBM et loggue les metriques dans MLflow.
    command: ["python", "-m", "src.train_models", "--cv", "3"]
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      - mlflow
    volumes:
      - models_data:/app/models
    profiles:
      - train

  evaluate:
    build:
      context: .
      dockerfile: docker/Dockerfile.train
    command: ["python", "-m", "src.evaluate", "--no-validate"]
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      - mlflow
    profiles:
      - train

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - models_data:/app/models:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    environment:
      API_URL: http://api:8000
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      mlflow:
        condition: service_started
      api:
        condition: service_healthy
    ports:
      - "8501:8501"
    profiles:
      - frontend

  airflow:
    image: apache/airflow:2.10.5
    command: airflow standalone
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      MLFLOW_TRACKING_URI: http://mlflow:5000
      API_URL: http://api:8000
      PYTHONPATH: /opt/airflow
      _PIP_ADDITIONAL_REQUIREMENTS: scikit-learn pandas numpy joblib httpx python-dotenv
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    depends_on:
      - mlflow
      - api
    volumes:
      - ./dags:/opt/airflow/dags
      - ./data:/opt/airflow/data
      - ./src:/opt/airflow/src
      - ./prepare_data.py:/opt/airflow/prepare_data.py
      - models_data:/opt/airflow/models
    restart: unless-stopped
    profiles:
      - airflow

volumes:
  mlflow_data:
  models_data:
